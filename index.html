<!DOCTYPE html>
<html lang="en">
<head>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000500;--fg:#4dcc6e;--primary:#00ff41;--primary-dim:#006618;
  --card-bg:#040d04;--sidebar-bg:#020802;
  --border:#0d2b0d;--border-hi:#1a5a1a;
  --muted-fg:#3a7d44;--accent:#00d4b8;--destructive:#ff4444;
  --font:'Share Tech Mono','Courier New',monospace;--vt:'VT323',monospace;

html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--font);font-size:14px;-webkit-font-smoothing:antialiased}
#rain{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.22}
.scanline{position:fixed;inset:0;pointer-events:none;z-index:1;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,.015) 2px,rgba(0,255,65,.015) 4px)}
#app{position:relative;z-index:2;height:100%}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--primary-dim);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--primary)}
::selection{background:rgba(0,255,65,.25);color:#ccffcc}
@keyframes glow-pulse{0%,100%{text-shadow:0 0 4px rgba(0,255,65,.5)}50%{text-shadow:0 0 14px #00ff41,0 0 28px rgba(0,255,65,.4)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes blink-dot{0%,80%,100%{opacity:0}40%{opacity:1}}
.glow{animation:glow-pulse 2.4s ease-in-out infinite}
.blink{animation:pulse 1s ease-in-out infinite}
input[type=text]{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--primary);
  font-family:var(--font);font-size:14px;padding:.55rem .75rem;outline:none;caret-color:var(--primary);transition:border-color .2s}
input[type=text]::placeholder{color:rgba(0,255,65,.2)}
input[type=text]:focus{border-color:rgba(0,255,65,.5);box-shadow:0 0 0 2px rgba(0,255,65,.12)}
.err{color:var(--destructive);font-size:12px;margin-top:.35rem}
.btn{display:block;width:100%;padding:.6rem 1rem;background:var(--primary);color:#000;
  font-family:var(--font);font-size:13px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  border:none;cursor:pointer;transition:opacity .2s,transform .1s;box-shadow:0 0 16px rgba(0,255,65,.3)}
.btn:hover{opacity:.9}.btn:active{transform:scale(.98)}.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.label{display:block;font-size:11px;letter-spacing:.2em;color:var(--muted-fg);text-transform:uppercase;margin-bottom:.45rem}
/* HOME */
.home{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.home-inner{width:100%;max-width:440px}
.logo-wrap{text-align:center;margin-bottom:2.5rem}
.logo-box{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;
  border:1px solid rgba(0,255,65,.4);margin-bottom:.5rem;
  box-shadow:0 0 24px rgba(0,255,65,.3),inset 0 0 24px rgba(0,255,65,.05)}
.ghost-lbl{font-size:11px;letter-spacing:.3em;color:var(--muted-fg);text-transform:uppercase;display:block;margin-bottom:.4rem}
.big-title{font-family:var(--vt);font-size:3.5rem;color:var(--primary);letter-spacing:.15em}
.subtitle{font-size:11px;letter-spacing:.22em;color:var(--muted-fg);margin-top:.3rem}
.card{background:var(--card-bg);border:1px solid var(--border);overflow:hidden;
  box-shadow:0 0 40px rgba(0,255,65,.06),0 0 1px rgba(0,255,65,.3)}
.card-sec{padding:1.2rem 1.4rem;border-bottom:1px solid var(--border)}
.card-sec:last-child{border-bottom:none}
.tabs{display:flex;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:.6rem;background:none;border:none;border-bottom:2px solid transparent;

.tab.on{border-bottom-color:var(--primary);color:var(--primary)}
.tab:hover:not(.on){color:var(--fg)}
.hint{font-size:12px;color:var(--muted-fg);line-height:1.8;margin-bottom:1rem}
.code-in{text-align:center;font-size:18px;letter-spacing:.5em;text-transform:uppercase}
.foot-badges{display:flex;gap:1.4rem;justify-content:center;margin-top:1.5rem;

/* ROOM */
.room{height:100vh;display:flex;overflow:hidden}
.sidebar{width:258px;min-width:258px;background:var(--sidebar-bg);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:10}
.sb-head{padding:.9rem 1rem;border-bottom:1px solid var(--border)}

.sb-icon{width:22px;height:22px;border:1px solid rgba(0,255,65,.4);display:flex;align-items:center;
  justify-content:center;box-shadow:0 0 8px rgba(0,255,65,.25)}

.code-box{background:rgba(0,255,65,.04);border:1px solid var(--border);padding:.7rem}

.st-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem}

.dot-r{background:var(--destructive)}
.dot-c{background:var(--accent);box-shadow:0 0 6px rgba(0,212,184,.7)}
.st-txt{font-size:11px;color:var(--muted-fg);letter-spacing:.1em}
.peers-list{flex:1;overflow-y:auto;padding:.65rem 1rem}
.no-peers{font-size:12px;color:rgba(0,255,65,.3);line-height:1.8}
.peer-item{display:flex;align-items:center;gap:.6rem;padding:.3rem 0}
.avatar{width:28px;height:28px;border-radius:2px;display:flex;align-items:center;

.peer-dot{position:absolute;bottom:-2px;right:-2px;width:8px;height:8px;border-radius:50%;border:1px solid var(--sidebar-bg)}
.p-name{font-size:13px;color:var(--fg)}
.p-status{font-size:11px;color:rgba(0,255,65,.4);letter-spacing:.1em}
.sb-foot{padding:.65rem 1rem;border-top:1px solid var(--border)}
.leave-btn{display:flex;align-items:center;gap:.5rem;background:none;border:1px solid transparent;

.chat-main{flex:1;display:flex;flex-direction:column;min-width:0;background:rgba(0,5,0,.55);backdrop-filter:blur(4px)}
.chat-head{height:48px;border-bottom:1px solid var(--border);padding:0 1rem;
  display:flex;align-items:center;justify-content:space-between;background:rgba(4,13,4,.85);flex-shrink:0}
.ch-left,.ch-right{display:flex;align-items:center;gap:.7rem}
.menu-btn{background:none;border:none;cursor:pointer;padding:.25rem;display:flex;flex-direction:column;

.err-banner{background:rgba(255,68,68,.08);border-bottom:1px solid rgba(255,68,68,.25);

.messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding-bottom:4rem}
.empty-icon{width:56px;height:56px;border:1px solid rgba(0,255,65,.3);display:flex;align-items:center;
  justify-content:center;margin-bottom:1rem;box-shadow:0 0 24px rgba(0,255,65,.1),inset 0 0 24px rgba(0,255,65,.05)}
.empty-title{font-size:14px;color:var(--primary);letter-spacing:.2em;text-transform:uppercase;margin-bottom:.35rem}
.empty-hint{font-size:12px;color:var(--muted-fg)}
.sys-msg{display:flex;justify-content:center;padding:.45rem 0}
.sys-txt{font-size:11px;color:rgba(0,255,65,.35);letter-spacing:.1em}
.msg-row{display:flex;gap:.7rem;margin-top:.7rem}
.msg-row.self{flex-direction:row-reverse}.msg-row.grouped{margin-top:2px}
.av-slot{width:36px;flex-shrink:0}
.msg-col{display:flex;flex-direction:column;max-width:72%;align-items:flex-start}
.msg-col.self{align-items:flex-end}
.msg-sender{font-size:11px;color:rgba(0,255,65,.5);margin-bottom:2px;padding-left:3px}
.brow{display:flex;align-items:flex-end;gap:.45rem}
.brow.self{flex-direction:row-reverse}
.bubble{padding:.45rem .7rem;border:1px solid;font-size:13px;line-height:1.55;word-break:break-word}
.bubble.self{background:rgba(0,100,24,.5);border-color:rgba(0,255,65,.25);color:var(--fg);box-shadow:0 0 8px rgba(0,255,65,.08)}
.bubble.other{background:rgba(4,13,4,.85);border-color:var(--border);color:var(--fg)}
.msg-time{font-size:11px;color:rgba(0,255,65,.25);flex-shrink:0;padding-bottom:2px}
.msg-ticks{font-size:11px;color:rgba(0,255,65,.3);margin-left:4px;letter-spacing:-2px;
  flex-shrink:0;align-self:flex-end;padding-bottom:3px;transition:color .3s}
.msg-ticks.read{color:var(--primary);text-shadow:0 0 6px rgba(0,255,65,.5)}
.typing-bar{display:flex;align-items:center;gap:.45rem;font-size:12px;color:var(--muted-fg);padding:.2rem .2rem .1rem}
.typing-dots{display:flex;gap:2px}
.tdot{width:4px;height:4px;border-radius:50%;background:var(--primary)}
.tdot:nth-child(1){animation:blink-dot 1.2s 0s infinite}
.tdot:nth-child(2){animation:blink-dot 1.2s .2s infinite}
.tdot:nth-child(3){animation:blink-dot 1.2s .4s infinite}
.input-area{border-top:1px solid var(--border);padding:.7rem 1rem;background:rgba(4,13,4,.88);flex-shrink:0;backdrop-filter:blur(4px)}
.input-row{display:flex;gap:.5rem;align-items:center}
.input-wrap{flex:1;display:flex;align-items:center;gap:.45rem;background:var(--bg);
  border:1px solid var(--border);padding:.5rem .7rem;transition:border-color .2s}
.input-wrap:focus-within{border-color:rgba(0,255,65,.4);box-shadow:0 0 0 2px rgba(0,255,65,.1)}
.input-prompt{color:rgba(0,255,65,.35);font-family:var(--font);font-size:14px;flex-shrink:0}
.msg-in{flex:1;background:transparent;border:none;outline:none;color:var(--fg);font-family:var(--font);font-size:13px;caret-color:var(--primary)}
.msg-in::placeholder{color:rgba(0,255,65,.2)}
.send-btn{width:40px;height:40px;background:transparent;border:1px solid rgba(0,255,65,.3);
  color:var(--primary);cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;box-shadow:0 0 8px rgba(0,255,65,.1)}
.send-btn:hover:not(:disabled){background:rgba(0,255,65,.1);box-shadow:0 0 12px rgba(0,255,65,.22)}
.send-btn:disabled{opacity:.3;cursor:not-allowed}
.input-foot{font-size:11px;color:rgba(0,255,65,.22);text-align:center;margin-top:.35rem;letter-spacing:.1em}
/* MOBILE DRAWER — slide left:-100% → 0, position:fixed, z-index:9999 */
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.76);z-index:9998}
.sb-drawer{position:fixed;top:0;left:-100%;bottom:0;width:258px;z-index:9999;transition:left .25s cubic-bezier(.4,0,.2,1)}
.sb-drawer.sb-open{left:0}
@media(max-width:767px){
  .sidebar{display:none}
  .close-sb{display:flex!important;align-items:center}
  .secure-lbl{display:none}
  .msg-col{max-width:84%}
}
</style>

<body>
<canvas id="rain"></canvas>
<div class="scanline"></div>
<div id="app"></div>
<script>
'use strict';

/* ══════════════════════════════════════════════════
   ICE CONFIG — Google STUN + OpenRelay TURN
   Ensures WebRTC offer/answer works across firewalls
══════════════════════════════════════════════════ */
const ICE = [
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'},
  {urls:'stun:stun2.l.google.com:19302'},
  {urls:'stun:stun3.l.google.com:19302'},
  {urls:'stun:stun4.l.google.com:19302'},
  {urls:'turn:openrelay.metered.ca:80',username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:openrelay.metered.ca:443',username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:openrelay.metered.ca:443?transport=tcp',username:'openrelayproject',credential:'openrelayproject'},
];

const TELEPORT_HANDLE = 'Hashir';
const TELEPORT_KEY    = '121212';
const LATEST_ROOM_KEY = 'ghost_latest_room';

/* ══════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════ */
const S = {
  screen:'home', name:'', roomId:'',
  peer:null, myPeerId:'', isHost:false,
  conns:new Map(),       // rid → DataConnection
  connecting:new Set(),  // rids currently dialing (dedup guard)
  peerNames:new Map(),   // rid → display name
  peerConn:new Map(),    // rid → bool (channel open)
  peerType:new Map(),    // rid → 'DIRECT' | 'RELAYED'
  roomKey:null,          // AES-256-GCM CryptoKey (extractable:false)
  msgs:[],
  typingPeers:new Map(), typingNames:[],
  status:'connecting', errorMsg:null,
  sidebarOpen:false,
  typingOutTimer:null,
  msgTickEls:new Map(),  // msgId → tick span el (read receipts)
};

/* ══════════════════════════════════════════════════
   BINARY RAIN
══════════════════════════════════════════════════ */
(()=>{
  const c=document.getElementById('rain'),ctx=c.getContext('2d');
  const fs=13;let drops=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;drops=Array.from({length:Math.floor(c.width/fs)},()=>Math.floor(Math.random()*-60));}
  resize();addEventListener('resize',resize);
  let last=0;
  function draw(t){requestAnimationFrame(draw);if(t-last<55)return;last=t;ctx.fillStyle='rgba(0,4,0,0.07)';ctx.fillRect(0,0,c.width,c.height);ctx.font=`${fs}px 'Share Tech Mono',monospace`;for(let i=0;i<drops.length;i++){const b=Math.random()>.5?'1':'0',y=drops[i]*fs;if(y<0){drops[i]+=.6;continue}ctx.fillStyle=Math.random()>.96?'#ccffcc':y<fs*2?'#00ff41':'#006618';ctx.fillText(b,i*fs,y);if(y>c.height&&Math.random()>.975)drops[i]=0;drops[i]+=.6;}}
  requestAnimationFrame(draw);
})();

/* ══════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════ */
const $ = id=>document.getElementById(id);
const genShortId = ()=>Math.random().toString(36).slice(2,8);
const genCode    = ()=>{const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join('');};
const fmtTime    = ts=>new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
const b64enc     = buf=>btoa(String.fromCharCode(...new Uint8Array(buf instanceof ArrayBuffer?buf:buf.buffer||buf)));
const b64dec     = str=>Uint8Array.from(atob(str),c=>c.charCodeAt(0)).buffer;

/* Wire-format prefix:
   0x00 + JSON  → plaintext control  (handshake, room-info, peer-joined, typing, receipt)
   0x01 + IV12 + GCM → AES-256-GCM encrypted (chat messages only)            */
function encodeRaw(obj){
  const j=new TextEncoder().encode(JSON.stringify(obj));
  const b=new Uint8Array(1+j.length);b[0]=0x00;b.set(j,1);return b.buffer;
}
async function encodeEncrypted(obj){
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},S.roomKey,new TextEncoder().encode(JSON.stringify(obj)));
  const out=new Uint8Array(1+12+ct.byteLength);out[0]=0x01;out.set(iv,1);out.set(new Uint8Array(ct),13);
  return out.buffer;
}
async function decodePacket(raw){
  try{
    const buf=raw instanceof ArrayBuffer?raw:(raw instanceof Blob?await raw.arrayBuffer():null);
    if(!buf)return null;
    const v=new Uint8Array(buf);
    if(v[0]===0x00)return JSON.parse(new TextDecoder().decode(buf.slice(1)));
    if(v[0]===0x01){
      if(!S.roomKey)return null;
      const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:buf.slice(1,13)},S.roomKey,buf.slice(13));
      return JSON.parse(new TextDecoder().decode(plain));
    }
    return JSON.parse(new TextDecoder().decode(buf));
  }catch{return null;}
}

const HUE=[135,175,50,300,0,200,80];
function avStyle(n){const h=HUE[n.charCodeAt(0)%HUE.length];return{bg:`hsl(${h} 80% 6%)`,fg:`hsl(${h} 100% 55%)`,bd:`hsl(${h} 80% 20%)`,sh:`0 0 6px hsl(${h} 100% 40%/.3)`};}
function mkAvatar(name,size=28){const d=document.createElement('div');d.className='avatar';d.style.cssText=`width:${size}px;height:${size}px`;const s=avStyle(name);d.style.background=s.bg;d.style.color=s.fg;d.style.borderColor=s.bd;d.style.boxShadow=s.sh;d.textContent=name[0].toUpperCase();return d;}

/* ══════════════════════════════════════════════════
   SECURITY — AES-256-GCM via PBKDF2
   Room code → shared symmetric key (extractable:false)
   All peers in the room derive the same key → E2E group encryption
══════════════════════════════════════════════════ */
async function deriveRoomKey(roomId){
  const raw=await crypto.subtle.importKey('raw',new TextEncoder().encode(roomId),{name:'PBKDF2'},false,['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2',salt:new TextEncoder().encode('ghost-link-v1-mesh-2025'),iterations:150000,hash:'SHA-256'},
    raw,
    {name:'AES-GCM',length:256},
    false,   // extractable:false — CRITICAL: key stays in memory only
    ['encrypt','decrypt']
  );
}

/* ══════════════════════════════════════════════════
   TYPING
══════════════════════════════════════════════════ */
function setTyping(pid,name,on){const ex=S.typingPeers.get(pid);if(ex)clearTimeout(ex.timer);if(on){const t=setTimeout(()=>{S.typingPeers.delete(pid);syncTypingNames();renderTyping();},3200);S.typingPeers.set(pid,{name,t});}else{S.typingPeers.delete(pid);}syncTypingNames();renderTyping();}
function clearTyping(pid){const ex=S.typingPeers.get(pid);if(ex)clearTimeout(ex.t||ex.timer);S.typingPeers.delete(pid);syncTypingNames();}
function syncTypingNames(){S.typingNames=Array.from(S.typingPeers.values()).map(v=>v.name);}

/* ══════════════════════════════════════════════════
   MESH TOPOLOGY — P2P CORE
   Every peer connects to every other peer directly.
   Host only brokers discovery (room-info + peer-joined broadcast).
   After discovery, all links are peer-to-peer (no hub).
══════════════════════════════════════════════════ */

function sendRaw(rid,obj){const c=S.conns.get(rid);if(c&&c.open)c.send(encodeRaw(obj));}
function broadcastRaw(obj){const b=encodeRaw(obj);for(const[,c]of S.conns)if(c.open)c.send(b);}
function broadcastRawExcept(obj,ex){const b=encodeRaw(obj);for(const[rid,c]of S.conns)if(rid!==ex&&c.open)c.send(b);}

async function sendMsg(text){
  if(!S.roomKey)return;
  const id=`${Date.now()}-${Math.random()}`;
  const buf=await encodeEncrypted({type:'chat',text,fromName:S.name,id});
  for(const[,c]of S.conns)if(c.open)c.send(buf);
  pushMsg({from:S.myPeerId,fromName:S.name,text,id,self:true});
  broadcastRaw({type:'typing',typing:false});
}
function sendTyping(on){broadcastRaw({type:'typing',typing:on});}

/* Detect whether WebRTC connection is direct or relayed (TURN) */
async function detectConnType(conn){
  try{
    const pc=conn.peerConnection;
    if(!pc)return'RELAYED';
    const stats=await pc.getStats();
    for(const[,r]of stats){
      if(r.type==='candidate-pair'&&(r.state==='succeeded'||r.nominated)){
        const lc=stats.get(r.localCandidateId);
        if(lc&&lc.candidateType!=='relay')return'DIRECT';
      }
    }
  }catch{}
  return'RELAYED';
}

/* Wire a DataConnection — handles both incoming (host←guest) and outgoing (guest→any) */
function wireConn(conn,rid){
  conn.on('open',()=>{
    S.conns.set(rid,conn);
    S.peerConn.set(rid,true);
    S.connecting.delete(rid);
    if(conn._dc){conn._dc.binaryType='arraybuffer';}

    // Send handshake first
    conn.send(encodeRaw({type:'handshake',name:S.name,peerId:S.myPeerId}));

    // If host: send room-info (existing peers) so new peer can mesh with them
    if(S.isHost){
      const peers=[...S.peerNames.entries()].filter(([id])=>id!==rid).map(([id,name])=>({id,name}));
      if(peers.length)conn.send(encodeRaw({type:'room-info',peers}));
    }
    updateSidebar();

    // Check connection type after ICE settles
    setTimeout(()=>detectConnType(conn).then(t=>{S.peerType.set(rid,t);updateSidebar();}),2500);
  });

  conn.on('data',async raw=>{
    const m=await decodePacket(raw);
    if(!m)return;

    if(m.type==='handshake'){
      const isNew=!S.peerNames.has(rid)||S.peerNames.get(rid).startsWith('\u2026');
      S.peerNames.set(rid,m.name);
      if(isNew){
        sysMsg(`${m.name} entered the tunnel`);
        // HOST broadcasts this peer's arrival to all existing peers so they can dial directly
        // This is the "user-joined" broadcast that enables the full mesh
        if(S.isHost){
          broadcastRawExcept({type:'peer-joined',peerId:rid,name:m.name},rid);
        }
      }
      updateSidebar();

    }else if(m.type==='room-info'){
      // Guest received list of existing peers → dial each one (mesh formation)
      for(const{id,name}of m.peers){
        if(id!==S.myPeerId&&!S.conns.has(id)&&!S.connecting.has(id)){
          S.peerNames.set(id,name);
          connectTo(id);
        }
      }

    }else if(m.type==='peer-joined'){
      // Existing peer notified a new peer joined → dial them directly
      if(m.peerId!==S.myPeerId&&!S.conns.has(m.peerId)&&!S.connecting.has(m.peerId)){
        if(m.name)S.peerNames.set(m.peerId,m.name);
        connectTo(m.peerId);
      }

    }else if(m.type==='chat'){
      clearTyping(rid);
      const name=S.peerNames.get(rid)||m.fromName||`\u2026${rid.slice(-4)}`;
      pushMsg({from:rid,fromName:name,text:m.text,id:m.id,self:false});
      // READ RECEIPT — send back immediately after rendering
      sendRaw(rid,{type:'READ_RECEIPT',id:m.id});

    }else if(m.type==='READ_RECEIPT'){
      const el=S.msgTickEls.get(m.id);
      if(el){el.textContent='\u2713\u2713';el.classList.add('read');}

    }else if(m.type==='typing'){
      const name=S.peerNames.get(rid)||`\u2026${rid.slice(-4)}`;
      setTyping(rid,name,m.typing);
    }
  });

  conn.on('close',()=>{
    S.conns.delete(rid);S.connecting.delete(rid);S.peerType.delete(rid);
    const name=S.peerNames.get(rid)||`\u2026${rid.slice(-4)}`;
    clearTyping(rid);S.peerNames.delete(rid);S.peerConn.delete(rid);
    sysMsg(`${name} left the tunnel`);
    updateSidebar();renderTyping();
  });

  conn.on('error',()=>{S.connecting.delete(rid);S.peerConn.set(rid,false);updateSidebar();});
}

/* Open a new connection to a peer (dedup-safe) */
function connectTo(rid){
  if(!S.peer||S.peer.destroyed)return;
  if(S.conns.has(rid)||S.connecting.has(rid))return;
  S.connecting.add(rid);
  if(!S.peerNames.has(rid))S.peerNames.set(rid,`\u2026${rid.slice(-4)}`);
  S.peerConn.set(rid,false);
  const conn=S.peer.connect(rid,{serialization:'binary',reliable:true});
  S.conns.set(rid,conn);
  wireConn(conn,rid);
  updateSidebar();
}

/* ══════════════════════════════════════════════════
   PEER INIT
   tryInit(roomCode, true)  → try to be host
   On unavailable-id error  → become guest, dial host
══════════════════════════════════════════════════ */
function initPeer(){
  function tryInit(pid,isHost){
    const peer=new Peer(pid,{config:{iceServers:ICE},debug:0});
    S.peer=peer;

    peer.on('open',id=>{
      S.myPeerId=id;S.isHost=isHost;
      S.status='connected';S.errorMsg=null;
      updateStatus();
      if(!isHost){
        // Guest: dial the host (roomCode) — triggers offer/answer via PeerJS signaling server
        connectTo(S.roomId);
      }
    });

    // Incoming connections (host receives guests; guests receive direct-dial peers)
    peer.on('connection',conn=>{
      const rid=conn.peer;
      // Dedup: if we already have an open conn to this peer, reject incoming
      const existing=S.conns.get(rid);
      if(existing&&existing.open){conn.close();return;}
      // Replace stale conn
      if(existing){S.conns.delete(rid);}
      S.connecting.delete(rid);
      S.conns.set(rid,conn);
      S.peerConn.set(rid,false);
      wireConn(conn,rid);
    });

    peer.on('error',err=>{
      if(err.type==='unavailable-id'){
        peer.destroy();
        // Room already exists → become guest with unique ID, dial host
        tryInit(`${S.roomId}-${genShortId()}`,false);
        return;
      }
      if(err.type==='peer-unavailable')return;
      S.errorMsg=`ERR: ${err.message}`;S.status='error';updateStatus();
    });
    peer.on('disconnected',()=>{if(!peer.destroyed)peer.reconnect();});
  }
  tryInit(S.roomId,true);
}

function doCreate(){
  const n=$('nameIn').value.trim();
  if(!n){showErr('nameErr','[ HANDLE REQUIRED ]');return;}
  S.name=n;S.roomId=genCode();
  try{localStorage.setItem(LATEST_ROOM_KEY,S.roomId);}catch{}
  enterRoom();
}

function doJoin(){
  const n=$('nameIn').value.trim();
  const c=($('codeIn')||{value:''}).value.trim().toUpperCase();
  if(!n){showErr('nameErr','[ HANDLE REQUIRED ]');return;}

  /* ══ MASTER TELEPORT KEY ══════════════════════════════════════════════
     Hashir + 121212 → reads latest room from localStorage,
     sets S.name + S.roomId, then calls enterRoom() which:
       1. derives the AES-256-GCM room key
       2. calls initPeer() → tryInit(roomId, true)
       3. gets unavailable-id (room is active) → guest mode
       4. dials the host → triggers WebRTC offer/answer
       5. mesh forms via peer-joined broadcasts
  ══════════════════════════════════════════════════════════════════════ */
  if(n===TELEPORT_HANDLE&&c===TELEPORT_KEY){
    let latest='';
    try{latest=localStorage.getItem(LATEST_ROOM_KEY)||'';}catch{}
    if(latest){
      S.name=n;
      S.roomId=latest;
      sysFlash(`TELEPORTING \u2192 ${latest}`);
      enterRoom();   // ← registers with signaling server, starts mesh node
      return;
    }else{
      showErr('codeErr','[ NO ACTIVE ROOM IN MEMORY ]');return;
    }
  }

  if(!c){showErr('codeErr','[ ACCESS KEY REQUIRED ]');return;}
  S.name=n;S.roomId=c;
  enterRoom();
}

/* enterRoom: derives AES key → starts peer node → mesh begins */
function enterRoom(){
  if(S.peer&&!S.peer.destroyed){S.peer.destroy();S.peer=null;}
  S.screen='room';S.msgs=[];
  S.conns.clear();S.connecting.clear();S.peerNames.clear();
  S.peerConn.clear();S.peerType.clear();S.msgTickEls.clear();
  S.typingPeers.clear();S.typingNames=[];
  S.roomKey=null;S.myPeerId='';S.isHost=false;
  S.status='connecting';S.errorMsg=null;S.sidebarOpen=false;
  renderRoom();
  // Step 1: derive room AES key from room code (PBKDF2)
  deriveRoomKey(S.roomId).then(key=>{
    S.roomKey=key;
    // Step 2: start libp2p-style mesh node via PeerJS signaling
    initPeer();
  }).catch(err=>{
    S.errorMsg=`KEY ERR: ${err.message}`;S.status='error';updateStatus();
  });
}

function pushMsg(msg){
  const full={...msg,id:msg.id||`${Date.now()}-${Math.random()}`,ts:Date.now()};
  const prev=S.msgs[S.msgs.length-1];S.msgs.push(full);
  appendMsgDOM(full,prev);scrollBottom();
}
function sysMsg(text){
  S.msgs.push({isSystem:true,text,ts:Date.now()});
  const el=document.createElement('div');el.className='sys-msg';
  el.innerHTML=`<span class="sys-txt">\u2500\u2500 ${text} \u2500\u2500</span>`;
  if(msgsEl){msgsEl.appendChild(el);scrollBottom();}
}
function appendMsgDOM(msg,prev){
  const es=$('emptyState');if(es)es.remove();if(!msgsEl)return;
  const prevSys=prev&&prev.isSystem;
  const showAv=!msg.self&&(!prev||prev.from!==msg.from||prevSys);
  const grouped=!showAv&&!msg.self&&prev&&prev.from===msg.from;
  const row=document.createElement('div');
  row.className='msg-row'+(msg.self?' self':'')+(grouped?' grouped':'');
  if(!msg.self){const slot=document.createElement('div');slot.className='av-slot';if(showAv)slot.appendChild(mkAvatar(msg.fromName));row.appendChild(slot);}
  const col=document.createElement('div');col.className='msg-col'+(msg.self?' self':'');
  if(showAv&&!msg.self){const sn=document.createElement('div');sn.className='msg-sender';sn.textContent=msg.fromName;col.appendChild(sn);}
  const br=document.createElement('div');br.className='brow'+(msg.self?' self':'');
  const bub=document.createElement('div');bub.className='bubble '+(msg.self?'self':'other');bub.textContent=msg.text;
  const tm=document.createElement('span');tm.className='msg-time';tm.textContent=fmtTime(msg.ts);
  if(msg.self){

    S.msgTickEls.set(msg.id,tick);
    br.appendChild(bub);br.appendChild(tick);br.appendChild(tm);

  col.appendChild(br);row.appendChild(col);msgsEl.appendChild(row);
}

      const dotGlow=ok?(type==='DIRECT'?'box-shadow:0 0 4px rgba(0,255,65,.9)':'box-shadow:0 0 4px rgba(0,212,184,.7)'):'';
      el.innerHTML+=`<div class="peer-item">
        <div class="avatar" style="width:28px;height:28px;background:${s.bg};color:${s.fg};border-color:${s.bd}">
          ${name[0].toUpperCase()}
          <div class="peer-dot" style="background:${dotColor};${dotGlow}"></div>
        </div>
        <div><div class="p-name">${name}</div><div class="p-status">${ok?type:'LINKING...'}</div></div>
      </div>`;
    }
  });
}

function updateStatus(){
  ['dsk','mob'].forEach(uid=>{
    const dot=$(uid+'SDot'),txt=$(uid+'STxt');
    if(dot)dot.className='dot '+(S.status==='connected'?'dot-g':S.status==='error'?'dot-r':'dot-a');
    if(txt)txt.textContent=S.status==='connected'?'TUNNEL ACTIVE':S.status==='error'?'SIGNAL LOST':'ESTABLISHING...';
  });
  const eb=$('errBanner');
  if(eb){if(S.errorMsg){eb.style.display='flex';eb.innerHTML=`<span class="blink">&#x25AE;</span> ${S.errorMsg}`;}else eb.style.display='none';}
  const mi=$('msgIn'),sb=$('sendBtn');
  if(mi)mi.disabled=S.status!=='connected';
  if(sb)sb.disabled=S.status!=='connected';
  updateSidebar();
}

/* ══════════════════════════════════════════════════
   ACTIONS
══════════════════════════════════════════════════ */
function doSend(){
  const mi=$('msgIn');if(!mi)return;
  const text=mi.value.trim();if(!text)return;
  mi.value='';sendMsg(text);
  clearTimeout(S.typingOutTimer);S.typingOutTimer=null;mi.focus();
}

/* MOBILE DRAWER — slide via CSS class, not display:none */
function toggleSb(){
  S.sidebarOpen=!S.sidebarOpen;
  if(innerWidth<768){
    overlayEl.style.display=S.sidebarOpen?'block':'none';
    drawerEl.classList.toggle('sb-open',S.sidebarOpen);
  }else{
    if(sbEl){sbEl.style.display=S.sidebarOpen?'none':'flex';S.sidebarOpen=sbEl.style.display==='none';}
  }
}
function closeSb(){
  S.sidebarOpen=false;
  if(overlayEl)overlayEl.style.display='none';
  if(drawerEl)drawerEl.classList.remove('sb-open');
}
function copyCode(btn){
  navigator.clipboard.writeText(S.roomId).then(()=>{btn.textContent='COPIED';setTimeout(()=>btn.textContent='COPY',2000);});
}
function leaveRoom(){
  clearTimeout(S.typingOutTimer);
  broadcastRaw({type:'leave',name:S.name});
  if(S.peer&&!S.peer.destroyed)S.peer.destroy();
  S.peer=null;
  S.conns.clear();S.connecting.clear();S.peerNames.clear();
  S.peerConn.clear();S.peerType.clear();S.msgTickEls.clear();
  S.typingPeers.clear();
  S.screen='home';renderHome();
}

/* ══════════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════════ */
renderHome();
</script>
